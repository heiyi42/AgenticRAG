                  </div>
                </div>
              </div>
            `;
          }
          return `
            <div class="user-wrap" data-msg-index="${idx}">
              <div class="msg user">${escapeHtml(item.content || "")}</div>
              <div class="msg-actions">
                <button class="msg-action-btn" type="button" data-msg-action="copy" title="复制消息" aria-label="复制消息">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="9" y="3" width="12" height="12" rx="3"></rect>
                    <rect x="3" y="9" width="12" height="12" rx="3"></rect>
                  </svg>
                </button>
                <button class="msg-action-btn" type="button" data-msg-action="edit" title="编辑消息" aria-label="编辑消息">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 20h4l10-10a2.2 2.2 0 0 0-4-4L4 16v4z"></path>
                    <path d="M13 7l4 4"></path>
                  </svg>
                </button>
              </div>
            </div>
          `;
        }
        const assistantCls = item.streaming ? "msg assistant streaming" : "msg assistant";
        const assistantBody = item.streaming
          ? formatAssistantStreamingMessage(item.content || "")
          : formatAssistantMessage(item.content || "");
        return `<div class="${assistantCls}">${assistantBody}${meta}</div>`;
      }).join("");
      const isPending = state.pendingChatId === chat.chat_id;
      let pendingHtml = "";
      if (isPending) {
        const spacerHeight = Math.max(260, Math.round(ui.chatBody.clientHeight));
        pendingHtml = `
          ${renderPendingIndicator()}
          <div class="pending-spacer" style="height:${spacerHeight}px;"></div>

      ui.chatBody.innerHTML = `${html}${pendingHtml}`;
      bindStreamingMessageDomRefs();
      if (isPending) {
        const userMessages = ui.chatBody.querySelectorAll(".msg.user");
        const lastUserMessage = userMessages[userMessages.length - 1];
        if (lastUserMessage) {
          const bodyTop = ui.chatBody.getBoundingClientRect().top;
          const msgTop = lastUserMessage.getBoundingClientRect().top;
          const delta = msgTop - bodyTop - 8;
          ui.chatBody.scrollTop += delta;
          return;
        }
      }
      scrollChatToBottom();
    }

    }

    function closeCodeAnalysisModal({ restoreFocus = true } = {}) {
      ui.codeAnalysisModal.classList.remove("open");
      if (restoreFocus) {
        ui.input.focus();
      }
    }

    function renderAll() {
      renderTopbar();
      renderChatList();
      renderModeMenu();
      renderSubjectMenu();
      renderComposerHint();
      renderCodeAnalysisControls();
      renderSubjectHint();
      renderMessages();
      updateSendButton();
      resizeMessageInput();
    }

    function openModeMenu() {
      ui.modeMenu.classList.add("open");
    }

    function closeModeMenu() {
      ui.modeMenu.classList.remove("open");
    }

    function openSubjectMenu() {
      ui.subjectMenu.classList.add("open");
    }

    function closeSubjectMenu() {
      ui.subjectMenu.classList.remove("open");
    }

    async function createChat(modeId = state.preferredMode, options = {}) {
      const nextMode = getModeMeta(modeId).id;
      const attach = options.attach !== false;
      const optimisticTitle = String(options.optimisticTitle || "").trim();
      const chat = await apiJson("/api/chats", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mode: nextMode })
      });
      if (!chat.mode) chat.mode = nextMode;
      if (!Array.isArray(chat.messages)) chat.messages = [];
      chat.subjectSelection = normalizeSubjectSelection(
        options.subjectSelection || state.preferredSubject
      );
      if (optimisticTitle) {
        chat.title = optimisticTitle;
      }
      if (attach) {
        state.chats.unshift(chat);
        sortChatsInState();
        state.activeChatId = chat.chat_id;
        state.preferredMode = chat.mode;
        state.preferredSubject = chat.subjectSelection;
        state.openChatActionId = null;
        renderAll();
        ui.input.focus();
      }
      return chat;
    }

    async function deleteChat(chatId) {
      clearScheduledTitleRefresh(chatId);
      clearChatTitleHighlight(chatId);
      await apiJson(`/api/chats/${chatId}/delete`, { method: "POST" });
      state.openChatActionId = null;
      state.renamingChatId = null;
      if (state.pendingChatId === chatId) {
        state.pendingChatId = null;
        state.pendingLabel = "";
        state.pendingStyle = "label";
        state.pendingRequestKind = "chat";
      }

      const deletedActive = state.activeChatId === chatId;
      state.chats = state.chats.filter(c => c.chat_id !== chatId);

      if (state.chats.length === 0) {
        state.activeChatId = null;
        renderAll();
        ui.input.focus();
        return;
      }

      if (deletedActive) {
        state.activeChatId = state.chats[0].chat_id;
        renderAll();
        await ensureChatLoaded(state.activeChatId);
        renderAll();
        return;
      }

      renderAll();
    }

    async function loadChats() {
      const data = await apiJson("/api/chats");
      mergeChatListMetadata((data.chats || []).map(item => ({
        ...item,
        messages: null,
        subjectSelection: normalizeSubjectSelection(item.subjectSelection || "auto")
      })));
    }

    async function sendMessage(options = {}) {
      if (state.sending) return;
      const requestKind = String(options.requestKind || "chat");
      const originalInput = String(ui.input.value || "");
      const rawMessage = Object.prototype.hasOwnProperty.call(options, "message")
        ? String(options.message || "")
        : originalInput;
      const message = rawMessage.trim();
      if (!message) return;
      stopStreamTyping();
      const clearMainInput = options.clearMainInput !== false;
      if (clearMainInput) {
        setMessageInputValue("");
      }

      let chat = getActiveChat();
      if (!chat) {
        try {
          chat = await createChat(state.preferredMode, {
            attach: true,
            optimisticTitle: "对话",
            subjectSelection: state.preferredSubject
          });
        } catch (err) {
          if (clearMainInput && !String(ui.input.value || "").trim()) {
            setMessageInputValue(message);
          }
          alert(`创建聊天失败：${err.message}`);
          return;
        }
      }

      try {
        await ensureChatLoaded(chat.chat_id);
      } catch (err) {
        if (clearMainInput && !String(ui.input.value || "").trim()) {
          setMessageInputValue(message);
        }
        alert(`加载聊天失败：${err.message}`);
        return;
      }
      const shouldScheduleTitleSync = Array.isArray(chat.messages) && chat.messages.length === 0;
      chat.messages.push({ role: "user", content: message });
      chat.message_count = (chat.message_count || 0) + 1;
      state.sending = true;
      state.activeRequestController = new AbortController();
      state.pendingChatId = chat.chat_id;
      state.pendingRequestKind = requestKind;
      state.pendingLabel = String(options.pendingLabel || getPendingLabel(chat.mode, requestKind));
      state.pendingStyle = String(options.pendingStyle || getPendingStyle(chat.mode, message));
      updateSendButton();

      let assistantMsg = null;
      let streamMeta = {};
      let gotDelta = false;
      let gotDone = false;

      function ensureAssistantMessage() {
        if (assistantMsg) return assistantMsg;
        assistantMsg = { role: "assistant", content: "", meta: "", streaming: true };
        chat.messages.push(assistantMsg);
        chat.message_count = (chat.message_count || 1) + 1;
        beginStreamTyping(chat.chat_id, assistantMsg);
        renderMessages();
        return assistantMsg;
      }

      try {
        renderMessages();
        renderChatList();
        const requestedSubjects = getRequestedSubjects(getChatSubjectSelection(chat));
        const streamPayload = {
          message,
          mode: chat.mode,
          stream_chunk_size: 48,
          subjects: requestedSubjects,
          ...(options.extraPayload || {})
        };
        await streamChatMessage(
          `/api/chats/${chat.chat_id}/messages/stream`,
          streamPayload,
          state.activeRequestController.signal,
          (event, data) => {
            if (event === "meta") {
              streamMeta = { ...streamMeta, ...(data || {}) };
              if (streamMeta.chat_title) {
                chat.title = String(streamMeta.chat_title);
              }
              const nextRequestKind = String(streamMeta.request_kind || state.pendingRequestKind || "chat");
              if (nextRequestKind === "code_analysis") {
                state.pendingRequestKind = "code_analysis";
              } else if (nextRequestKind === "problem_tutoring") {
                state.pendingRequestKind = "problem_tutoring";
              }
              const retrievalUsed = normalizeBoolean(streamMeta.retrieval_used);
              if (state.pendingChatId === chat.chat_id && retrievalUsed !== null) {
                if (state.pendingRequestKind === "code_analysis" || nextRequestKind === "code_analysis") {
                  state.pendingStyle = "label";
                  state.pendingLabel = getPendingLabel(chat.mode, "code_analysis");
                } else if (state.pendingRequestKind === "problem_tutoring" || nextRequestKind === "problem_tutoring") {
                  state.pendingStyle = "label";
                  state.pendingLabel = getPendingLabel(chat.mode, "problem_tutoring");
                } else if (retrievalUsed) {
                  state.pendingStyle = "label";
                  state.pendingLabel = getPendingLabel(chat.mode);
                } else {
                  state.pendingStyle = "dots";
                  state.pendingLabel = "";
                }
                renderMessages();
              }
              return;
            }

            if (event === "delta") {
              const text = String((data && data.text) || "");
              if (!text) return;
              const isFirstDelta = !gotDelta;
              gotDelta = true;
              if (isFirstDelta) {
                clearPendingIndicator(chat.chat_id);
              }
              const msgRef = ensureAssistantMessage();
              if (!msgRef.meta && streamMeta.assistant_meta) {
                msgRef.meta = String(streamMeta.assistant_meta);
                syncStreamingMessageDom();
              }
              enqueueStreamText(text);
              return;
            }

            if (event === "done") {
              gotDone = true;
              const done = data || {};
              streamMeta = { ...streamMeta, ...done };
              if (streamMeta.chat_title) {
                chat.title = String(streamMeta.chat_title);
              }
              clearPendingIndicator(chat.chat_id);
              const msgRef = ensureAssistantMessage();
              if (streamMeta.assistant_meta) {
                msgRef.meta = String(streamMeta.assistant_meta);
                syncStreamingMessageDom();
              }
              const doneAnswer = String(done.answer || "");
              if (doneAnswer && !gotDelta) {
                enqueueStreamText(doneAnswer);
                gotDelta = true;
              }
            }
          }
        );

        if (!assistantMsg) {
          clearPendingIndicator(chat.chat_id);
          const msgRef = ensureAssistantMessage();
          const fallbackAnswer = String(streamMeta.answer || "未返回答案");
          if (streamMeta.assistant_meta) {
            msgRef.meta = String(streamMeta.assistant_meta);
            syncStreamingMessageDom();
          }
          enqueueStreamText(fallbackAnswer);
        }

        await finishStreamTyping();
        if (assistantMsg) assistantMsg.streaming = false;

        if (!gotDone && assistantMsg && String(assistantMsg.content || "").trim() === "") {
          assistantMsg.content = "未返回答案";
          renderMessages();
        }

        chat.updated_at = Date.now() / 1000;
        bubbleChatToTop(chat.chat_id);
        if (shouldScheduleTitleSync) {
          scheduleChatTitleRefresh(chat.chat_id, String(chat.title || ""));
        }
      } catch (err) {
        if (err && err.name === "AbortError") {
          stopStreamTyping();
          return;
        }
        if (assistantMsg) {
          if (String(assistantMsg.content || "").trim() === "") {
            assistantMsg.content = `请求失败：${err.message}`;
          } else {
            assistantMsg.content += `\n\n请求失败：${err.message}`;
          }
          await finishStreamTyping();
          assistantMsg.streaming = false;
        } else {
          chat.messages.push({ role: "assistant", content: `请求失败：${err.message}` });
          chat.message_count = (chat.message_count || 1) + 1;
        }
      } finally {
        stopStreamTyping();
        state.sending = false;
        state.activeRequestController = null;
        if (state.pendingChatId === chat.chat_id) {
          state.pendingChatId = null;
          state.pendingLabel = "";
          state.pendingStyle = "label";
        }
        state.pendingRequestKind = "chat";
        updateSendButton();
        renderMessages();
        renderChatList();
      }
    }

    async function submitCodeAnalysis() {
      if (state.sending) return;
      const active = getActiveChat();
      const subject = getChatSubjectSelection(active);
      if (!isCodeAnalysisSubject(subject)) {
        alert("只有在学科选择为 C语言 时才可使用代码分析。");
        return;
      }

      const code = String(ui.codeAnalysisCodeInput.value || "").replaceAll("\r\n", "\n").trim();
      if (!code) {
        alert("请先粘贴 C 代码。");
        ui.codeAnalysisCodeInput.focus();
        return;
      }

      const question = String(ui.codeAnalysisQuestionInput.value || "").trim();
      const message = buildCodeAnalysisMessage(question, code);
      closeCodeAnalysisModal({ restoreFocus: false });
      ui.codeAnalysisQuestionInput.value = "";
      ui.codeAnalysisCodeInput.value = "";
      setMessageInputValue("");

      await sendMessage({
        message,
        requestKind: "code_analysis",
        pendingLabel: getPendingLabel(getModeMeta((active && active.mode) || state.preferredMode).id, "code_analysis"),
        pendingStyle: "label",
        clearMainInput: false,
        extraPayload: {
          code_analysis: true
        }
      });
    }

    async function submitProblemTutoring() {
      if (state.sending) return;
      const message = String(ui.input.value || "").trim();
      if (!message) {
        alert("请先输入题目或题干。");
        ui.input.focus();
        return;
      }
      const active = getActiveChat();
      await sendMessage({
        requestKind: "problem_tutoring",
        pendingLabel: getPendingLabel(getModeMeta((active && active.mode) || state.preferredMode).id, "problem_tutoring"),
        pendingStyle: "label",
        extraPayload: {
          problem_tutoring: true
        }
      });
    }

    function stopGenerating() {
      if (!state.sending) return;
      if (state.activeRequestController) {
        state.activeRequestController.abort();
      }
      if (state.streamMessageRef) {
        state.streamMessageRef.streaming = false;
        state.streamQueue = "";
        state.streamClosed = true;
        pumpStreamTyping();
      }
    }

    ui.newChatBtn.addEventListener("click", () => {
      const active = getActiveChat();
      if (active) {
        state.preferredMode = getModeMeta(active.mode).id;
        state.preferredSubject = getChatSubjectSelection(active);
      }
      clearEditingState();
      state.activeChatId = null;
      state.openChatActionId = null;
      state.renamingChatId = null;
      closeDeleteModal();
      closeCodeAnalysisModal({ restoreFocus: false });
      closeChatActions();
      closeModeMenu();
      closeSubjectMenu();
      renderAll();
      ui.input.focus();
    });

    ui.sendBtn.addEventListener("click", () => {
      if (state.sending) {
        stopGenerating();
        return;
      }
      sendMessage();
    });
    ui.codeAnalysisBtn.addEventListener("click", () => {
      if (state.sending) return;
      openCodeAnalysisModal();
    });
    ui.problemTutoringBtn.addEventListener("click", async () => {
      await submitProblemTutoring();
    });
    ui.input.addEventListener("keydown", async (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        if (e.isComposing || e.keyCode === 229 || e.repeat) return;
        e.preventDefault();
        e.stopPropagation();
        await sendMessage();
      }
    });
    ui.input.addEventListener("input", resizeMessageInput);
    ui.codeAnalysisCloseBtn.addEventListener("click", () => {
      closeCodeAnalysisModal();
    });
    ui.codeAnalysisCancelBtn.addEventListener("click", () => {
      closeCodeAnalysisModal();
    });
    ui.codeAnalysisSubmitBtn.addEventListener("click", async () => {
      await submitCodeAnalysis();
    });
    ui.codeAnalysisModal.addEventListener("click", (e) => {
      if (e.target === ui.codeAnalysisModal) {
        closeCodeAnalysisModal();
      }
    });
    ui.codeAnalysisCodeInput.addEventListener("keydown", async (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
        e.preventDefault();
        await submitCodeAnalysis();
      }
    });

    ui.modeBtn.addEventListener("click", () => {
      if (ui.modeBtn.disabled) return;
      const isOpen = ui.modeMenu.classList.contains("open");
      if (isOpen) closeModeMenu();
      else {
        closeSubjectMenu();
        openModeMenu();
      }
    });

    ui.subjectBtn.addEventListener("click", () => {
      if (ui.subjectBtn.disabled) return;
      const isOpen = ui.subjectMenu.classList.contains("open");
      if (isOpen) closeSubjectMenu();
      else {
        closeModeMenu();
        openSubjectMenu();
      }
    });

    ui.chatActionsMenu.addEventListener("click", async (e) => {
      const actionEl = e.target.closest(".chat-action");
      if (!actionEl) return;
      const action = actionEl.dataset.action;
      const chatId = state.openChatActionId;
      if (!action || !chatId) return;
      closeChatActions();
      await handleChatAction(action, chatId);
    });

    ui.chatBody.addEventListener("click", async (e) => {
      const editActionEl = e.target.closest("[data-edit-action]");
      if (editActionEl) {
        const action = editActionEl.dataset.editAction;
        if (action === "cancel") {
          cancelEditMessage();
          return;
        }
        if (action === "send") {
          await submitEditedMessage();
          return;
        }
      }

      const actionEl = e.target.closest("[data-msg-action]");
      if (!actionEl) return;

      const wrapper = actionEl.closest(".user-wrap");
      if (!wrapper) return;
      const index = Number(wrapper.dataset.msgIndex);
      if (!Number.isFinite(index)) return;

      const chat = getActiveChat();
      if (!chat || !Array.isArray(chat.messages)) return;
      const target = chat.messages[index];
      if (!target || target.role !== "user") return;

      const action = actionEl.dataset.msgAction;
      if (action === "copy") {
        try {
          await copyText(target.content || "");
        } catch (_err) {}
        return;
      }
      if (action === "edit") {
        beginEditMessage(index);
      }
    });

    ui.chatBody.addEventListener("input", (e) => {
      const editInput = e.target.closest(".msg-edit-input");
      if (!editInput) return;
      const idx = Number(editInput.dataset.msgIndex);
      if (!Number.isFinite(idx)) return;
      if (state.editingChatId !== state.activeChatId || state.editingMessageIndex !== idx) {
        return;
      }
      state.editingDraft = editInput.value;
      const sendBtn = ui.chatBody.querySelector('[data-edit-action="send"]');
      if (sendBtn) {
        sendBtn.disabled = state.sending || String(state.editingDraft || "").trim().length === 0;
      }
    });

    ui.chatBody.addEventListener("keydown", async (e) => {
      const editInput = e.target.closest(".msg-edit-input");
      if (!editInput) return;
      if (e.key === "Escape") {
        e.preventDefault();
        cancelEditMessage();
        return;
      }
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        await submitEditedMessage();
      }
    });

    ui.deleteCancelBtn.addEventListener("click", closeDeleteModal);
    ui.deleteModal.addEventListener("click", (e) => {
      if (e.target === ui.deleteModal) {
        closeDeleteModal();
      }
    });
    ui.deleteConfirmBtn.addEventListener("click", async () => {
      const chatId = state.deletingChatId;
      if (!chatId) return;
      closeDeleteModal();
      try {
        await deleteChat(chatId);
      } catch (err) {
        alert(`删除失败：${err.message}`);
      }
    });

    ui.chatList.addEventListener("scroll", () => {
      if (state.openChatActionId) {
        closeChatActions();
      }
    });

    document.addEventListener("click", (e) => {
      if (!ui.modeMenu.contains(e.target) && !ui.modeBtn.contains(e.target)) {
        closeModeMenu();
      }
      if (!ui.subjectMenu.contains(e.target) && !ui.subjectBtn.contains(e.target)) {
        closeSubjectMenu();
      }
      if (
        !e.target.closest(".chat-actions-menu") &&
        !e.target.closest(".chat-menu-trigger")
      ) {
        if (state.openChatActionId) closeChatActions();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        if (ui.codeAnalysisModal.classList.contains("open")) {
          closeCodeAnalysisModal();
          return;
        }
        if (ui.deleteModal.classList.contains("open")) {
          closeDeleteModal();
          return;
        }
        if (state.renamingChatId) {
          state.renamingChatId = null;
          renderChatList();
          return;
        }
      }
    });

    window.addEventListener("beforeunload", () => {
      Object.keys(state.titleRefreshTimers).forEach(chatId => {
        clearScheduledTitleRefresh(chatId);
      });
      Object.keys(state.titleHighlightTimers).forEach(chatId => {
        clearChatTitleHighlight(chatId);
      });
      if (state.chatEventsSource) {
        state.chatEventsSource.close();
        state.chatEventsSource = null;
      }
    });

    (async function init() {
      try {
        initChatUpdatesStream();
        await loadChats();
        if (state.chats.length === 0) {
          state.activeChatId = null;
          renderAll();
          return;
        }
        state.activeChatId = state.chats[0].chat_id;
        renderAll();
        await ensureChatLoaded(state.activeChatId);
        renderAll();
      } catch (err) {
        ui.chatBody.innerHTML = `<div class="empty">初始化失败：${escapeHtml(err.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
